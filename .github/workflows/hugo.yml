name: Deploy Hugo Site

on:
  push:
    branches:
      - master   # Change to your branch name if different
  workflow_dispatch: # Allows manual runs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo & Build
        uses: chabad360/hugo-actions@v2
        with:
          buildPath: ./public
          args: --gc --minify --cleanDestinationDir
          hugoVersion: latest   # You can set e.g. 0.126.1

      - name: Deploy site to GitHub Pages
        uses: reuixiy/hugo-deploy@v1
        env:
          DEPLOY_REPO: ${{ github.repository }} # repo name in user/repo format
          DEPLOY_BRANCH: gh-pages               # branch to deploy to
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_DIR: public                     # matches Hugo's buildPath above
